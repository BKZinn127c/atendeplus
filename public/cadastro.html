<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro | Atende+</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(19,168,255,.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(154,243,29,.12), transparent 25%),
        linear-gradient(135deg, #020b28, #04113a 45%, #071a56);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .box {
      width: 100%;
      max-width: 520px;
      background: rgba(10, 22, 65, 0.92);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }
    p {
      margin: 0 0 20px;
      color: #bdd6ff;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .field { margin-bottom: 12px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #d8e8ff;
    }
    input {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      background: #17306f;
      color: white;
      outline: none;
    }
    input:focus {
      box-shadow: 0 0 0 2px rgba(19,168,255,.4);
    }
    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-weight: bold;
      color: #04113a;
      cursor: pointer;
      background: linear-gradient(135deg, #9af31d, #22d1ff);
      margin-top: 8px;
    }
    button:hover { opacity: .95; }
    .msg {
      min-height: 22px;
      margin-top: 14px;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      color: #ffb3b3;
    }
    .footer {
      margin-top: 18px;
      text-align: center;
      color: #bdd6ff;
      font-size: 14px;
    }
    .footer a {
      color: #9af31d;
      text-decoration: none;
      font-weight: bold;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Criar conta no Atende+</h1>
    <p>Cadastre sua empresa, acesse o painel e conecte o WhatsApp em poucos minutos.</p>

    <div class="grid">
      <div class="field">
        <label>Seu nome</label>
        <input type="text" id="nome" placeholder="Ex: Eliezer" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="Ex: contato@empresa.com" />
      </div>
    </div>

    <div class="grid">
      <div class="field">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Crie uma senha" />
      </div>
      <div class="field">
        <label>Telefone da empresa</label>
        <input type="text" id="telefone" placeholder="Ex: 55999999999" />
      </div>
    </div>

    <div class="grid">
      <div class="field">
        <label>Nome da empresa</label>
        <input type="text" id="empresaNome" placeholder="Ex: KingTV" />
      </div>
      <div class="field">
        <label>Nicho</label>
        <input type="text" id="nicho" placeholder="Ex: IPTV, Loja, Clínica" />
      </div>
    </div>

    <button onclick="cadastrar()">Criar conta</button>

    <div class="msg" id="msg"></div>

    <div class="footer">
      Já tem conta? <a href="/login.html">Entrar no painel</a>
    </div>
  </div>

  <script>
    async function cadastrar() {
      const body = {
        nome: document.getElementById("nome").value.trim(),
        email: document.getElementById("email").value.trim(),
        senha: document.getElementById("senha").value.trim(),
        empresaNome: document.getElementById("empresaNome").value.trim(),
        nicho: document.getElementById("nicho").value.trim(),
        telefone: document.getElementById("telefone").value.trim()
      };

      const msg = document.getElementById("msg");
      msg.textContent = "";

      if (!body.nome || !body.email || !body.senha || !body.empresaNome) {
        msg.textContent = "Preencha nome, email, senha e nome da empresa.";
        return;
      }

      try {
        const res = await fetch("/api/auth/cadastro", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (data.ok) {
          window.location.href = "/cliente.html";
        } else {
          msg.textContent = data.message || "Erro ao cadastrar.";
        }
      } catch (error) {
        msg.textContent = "Erro ao cadastrar. Tente novamente.";
      }
    }
  </script>
</body>
</html>
